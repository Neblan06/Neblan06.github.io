<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muestra con Reemplazo</title>

<script src="muestra.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f0f0f0;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);

    width:90%;
    max-width:1200px;

    display:flex;
    gap:40px;
    align-items:flex-start;
    justify-content:center;
    flex-wrap:wrap;
}

.info{
    max-width:350px;
}

.info h1{
    font-size:45px;
    margin-bottom:15px;
}

.formulario{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.formulario input{
    width:220px;
    padding:8px;
}

.botones{
    display:flex;
    gap:10px;
    margin-top:10px;
}

table, th, td{
    border:1px solid black;
    border-collapse:collapse;
    padding:8px;
    text-align:center;
}

.tabla-contenedor h2{
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="contenedor">

    <div class="info">
        <h1>Bienvenido a Mi Proyecto de Estadística</h1>
        <p>Este proyecto incluye el tema de Muestra con Reemplazo.</p>
    </div>

    <form class="formulario">

        <label>Dato 1:</label>
        <input type="number" id="Ddato1">

        <label>Dato 2:</label>
        <input type="number" id="Ddato2">

        <label>Dato 3:</label>
        <input type="number" id="Ddato3">

        <label>Dato 4:</label>
        <input type="number" id="Ddato4">

        <label>Dato 5:</label>
        <input type="number" id="Ddato5">

        <label>Dato 6:</label>
        <input type="number" id="Ddato6">

        <label>Dato 7:</label>
        <input type="number" id="Ddato7">

        <label>Dato 8:</label>
        <input type="number" id="Ddato8">

        <label>Dato 9:</label>
        <input type="number" id="Ddato9">

        <label>Dato 10:</label>
        <input type="number" id="Ddato10">

        <div class="botones">
            <button type="button" class="btn btn-success" onclick="calcular()">Calcular</button>

            <button type="button" class="btn btn-warning" onclick="limpiar()">Limpiar</button>
        </div>

    </form>

    <div class="tabla-contenedor">

        <h2>Tabla De Reemplazo</h2>

        <table id="tabla">

            <tr>
                <th>Muestra</th>
                <th>x̄</th>
                <th>∑x</th>
                <th>Fa</th>
                <th>x·Fa</th>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
